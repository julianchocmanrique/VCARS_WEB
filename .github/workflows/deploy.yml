name: Deploy VCARS_WEB to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (Intento 1)
        id: deploy_try_1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 1200s
          command_timeout: 120m
          script: |
            set -e
            LOCKFILE=/tmp/vcars_web_deploy.lock
            flock -w 5400 "$LOCKFILE" bash -s <<'EOF'
            set -euo pipefail
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            DISK_USE="$(df --output=pcent / | tail -n1 | tr -dc '0-9')"
            if [ "${DISK_USE:-0}" -ge 85 ]; then
              docker builder prune -af || true
              docker image prune -af || true
            fi
            if ! docker info >/dev/null 2>&1; then
              systemctl restart docker || service docker restart || true
              sleep 5
            fi
            cd /root/.openclaw/workspace/VCARS_WEB_SRC
            git fetch --prune --depth=1 origin main
            git reset --hard origin/main
            cd /root/.openclaw/workspace/deployments/vcars-web2
            # Mantener servicio arriba con la imagen actual mientras se reconstruye.
            docker compose up -d --no-build --remove-orphans || true
            # Build y levantamiento del servicio principal.
            docker compose up -d --build --remove-orphans vcars_web2 || docker compose up -d --build --remove-orphans
            docker compose ps
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | sed -n '1,20p'
            curl -fsSIL --max-time 15 http://127.0.0.1:3010/vcars/login/ || true
            curl -fsSIL --max-time 15 http://127.0.0.1/vcars/login/ || true
            df -h /
            docker system df
            EOF

      - name: Espera corta antes de reintento
        if: steps.deploy_try_1.outcome == 'failure'
        run: sleep 15

      - name: Deploy via SSH (Reintento)
        if: steps.deploy_try_1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 1200s
          command_timeout: 120m
          script: |
            set -e
            LOCKFILE=/tmp/vcars_web_deploy.lock
            flock -w 5400 "$LOCKFILE" bash -s <<'EOF'
            set -euo pipefail
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            DISK_USE="$(df --output=pcent / | tail -n1 | tr -dc '0-9')"
            if [ "${DISK_USE:-0}" -ge 85 ]; then
              docker builder prune -af || true
              docker image prune -af || true
            fi
            if ! docker info >/dev/null 2>&1; then
              systemctl restart docker || service docker restart || true
              sleep 5
            fi
            cd /root/.openclaw/workspace/VCARS_WEB_SRC
            git fetch --prune --depth=1 origin main
            git reset --hard origin/main
            cd /root/.openclaw/workspace/deployments/vcars-web2
            docker compose up -d --no-build --remove-orphans || true
            docker compose up -d --build --remove-orphans vcars_web2 || docker compose up -d --build --remove-orphans
            docker compose ps
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | sed -n '1,20p'
            curl -fsSIL --max-time 15 http://127.0.0.1:3010/vcars/login/ || true
            curl -fsSIL --max-time 15 http://127.0.0.1/vcars/login/ || true
            df -h /
            docker system df
            EOF
