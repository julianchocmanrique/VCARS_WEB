name: Deploy VCARS_WEB to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (intent 1)
        id: deploy_attempt_1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 120s
          command_timeout: 40m
          script: |
            set -e
            cd /root/.openclaw/workspace/VCARS_WEB_SRC
            git fetch --all
            git reset --hard origin/main
            cd /root/.openclaw/workspace/deployments/vcars-web2
            docker compose up -d --build
            docker compose ps

      - name: Deploy via SSH (intent 2)
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 120s
          command_timeout: 40m
          script: |
            set -e
            cd /root/.openclaw/workspace/VCARS_WEB_SRC
            git fetch --all
            git reset --hard origin/main
            cd /root/.openclaw/workspace/deployments/vcars-web2
            docker compose up -d --build
            docker compose ps

      - name: Fail if all attempts failed
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        run: |
          echo "Deploy failed after 2 SSH attempts."
          exit 1
