name: Deploy VCARS_WEB to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: deploy-vcars-web-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (Intento 1)
        id: deploy_try_1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 180s
          command_timeout: 40m
          script: |
            set -e
            cd /root/.openclaw/workspace/VCARS_WEB_SRC
            git fetch --all
            git reset --hard origin/main
            cd /root/.openclaw/workspace/deployments/vcars-web2
            docker compose up -d --build
            docker compose ps

      - name: Espera corta antes de reintento
        if: steps.deploy_try_1.outcome == 'failure'
        run: sleep 15

      - name: Deploy via SSH (Reintento)
        if: steps.deploy_try_1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 180s
          command_timeout: 40m
          script: |
            set -e
            cd /root/.openclaw/workspace/VCARS_WEB_SRC
            git fetch --all
            git reset --hard origin/main
            cd /root/.openclaw/workspace/deployments/vcars-web2
            docker compose up -d --build
            docker compose ps
