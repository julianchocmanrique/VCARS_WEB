name: Deploy VCARS_WEB to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (Intento 1)
        id: deploy_try_1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 180s
          command_timeout: 120m
          script: |
            set -e
            LOCKFILE=/tmp/vcars_web_deploy.lock
            flock -w 5400 "$LOCKFILE" bash -s <<'EOF'
            set -e
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            if ! docker info >/dev/null 2>&1; then
              systemctl restart docker || service docker restart || true
              sleep 5
            fi
            cd /root/.openclaw/workspace/VCARS_WEB_SRC
            git fetch --prune --depth=1 origin main
            git reset --hard origin/main
            cd /root/.openclaw/workspace/deployments/vcars-web2
            # Primero intenta levantar rapido con la imagen actual para salir de 502.
            if ! docker compose up -d --remove-orphans; then
              docker compose up -d --build --remove-orphans
            fi
            docker compose ps
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | sed -n '1,20p'
            EOF

      - name: Espera corta antes de reintento
        if: steps.deploy_try_1.outcome == 'failure'
        run: sleep 15

      - name: Deploy via SSH (Reintento)
        if: steps.deploy_try_1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 180s
          command_timeout: 120m
          script: |
            set -e
            LOCKFILE=/tmp/vcars_web_deploy.lock
            flock -w 5400 "$LOCKFILE" bash -s <<'EOF'
            set -e
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            if ! docker info >/dev/null 2>&1; then
              systemctl restart docker || service docker restart || true
              sleep 5
            fi
            cd /root/.openclaw/workspace/VCARS_WEB_SRC
            git fetch --prune --depth=1 origin main
            git reset --hard origin/main
            cd /root/.openclaw/workspace/deployments/vcars-web2
            if ! docker compose up -d --remove-orphans; then
              docker compose up -d --build --remove-orphans
            fi
            docker compose ps
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | sed -n '1,20p'
            EOF
